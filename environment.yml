name: coloc_env
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # Python / Pipeline execution
  - python>=3.9
  - snakemake-minimal
  - pandas
  
  # Command line tools
  - plink2
  - htslib      # This provides 'tabix' and 'bgzip'
  - gawk        # Ensures standard awk behavior
  - curl
   
  # R and R packages
  - r-base>=4.3.0
  - r-optparse
  - r-dplyr
  - r-readr
  - r-ggplot2
  - r-gridextra
  - r-scales
  - r-matrix
  - r-coloc
  - r-seqminer
  