# =============================================================================
# Snakemake SLURM profile for coloc_pipeline.
# Cluster-specific defaults — edit partition/account/time for your site.
# =============================================================================
cluster:
  mkdir -p logs/{rule} &&
  sbatch
    --parsable
    --job-name=colocpipe.{rule}.{wildcards}
    --output=logs/{rule}/{rule}.{wildcards}.%j.out
    --error=logs/{rule}/{rule}.{wildcards}.%j.err
    --time={resources.time}
    --mem={resources.mem_mb}M
    --cpus-per-task={threads}

default-resources:
  - mem_mb=4000
  - time="04:00:00"

set-threads:
  parse_susiex: 1
  fetch_eqtl: 2
  run_coloc_pair: 1
  locus_report: 1
  summary_report: 1

set-resources:
  parse_susiex:
    mem_mb: 4000
    time: "00:30:00"
  fetch_eqtl:
    mem_mb: 6000
    time: "02:00:00"
  run_coloc_pair:
    mem_mb: 6000
    time: "01:00:00"
  locus_report:
    mem_mb: 4000
    time: "00:30:00"
  summary_report:
    mem_mb: 4000
    time: "00:30:00"
  compute_ld:
    mem_mb: 8000
    time: "01:00:00"

jobs: 200
keep-going: true
restart-times: 1
rerun-incomplete: true
printshellcmds: true
