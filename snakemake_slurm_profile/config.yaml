# =============================================================================
# Snakemake 8/9 SLURM profile for coloc_pipeline.
# Requires: snakemake-executor-plugin-slurm
# =============================================================================
executor: slurm

default-resources:
  mem_mb: 4000
  runtime: "4h"
  slurm_account: h_vmac

set-threads:
  parse_susiex: 1
  fetch_eqtl: 2
  run_coloc_pair: 1
  locus_report: 1
  summary_report: 1

set-resources:
  extract_gwas_region:
    mem_mb: 16000
    runtime: "1h"
  parse_susiex:
    mem_mb: 4000
    runtime: "30m"
  fetch_eqtl:
    mem_mb: 6000
    runtime: "2h"
  run_coloc_pair:
    mem_mb: 6000
    runtime: "1h"
  locus_report:
    mem_mb: 4000
    runtime: "30m"
  summary_report:
    mem_mb: 4000
    runtime: "30m"
  compute_ld:
    mem_mb: 8000
    runtime: "1h"

jobs: 200
keep-going: true
restart-times: 1
rerun-incomplete: true
printshellcmds: true